# Overlay: VPN via Tailscale.
#
# Secrets via justfile aus inventory/secrets/vpn.tailscale.env.enc dekryptiert
# und als --env-file an docker compose übergeben. Erwartete Variablen:
#   TS_AUTHKEY    Reusable oder Ephemeral, mit Tag tag:inventory
#   TS_HOSTNAME   (optional, default: inventory-strato)

services:
  vpn:
    # Digest-Pin (Architekt-R4) — Tag tailscale/tailscale:latest, aufgeloest 2026-05-17.
    image: tailscale/tailscale:latest@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
    container_name: vpn-tailscale
    hostname: ${TS_HOSTNAME:-inventory-strato}
    restart: unless-stopped
    # cap_drop:ALL + gezieltes cap_add — nur die fuer das tun-Device noetigen Caps.
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY must be set}
      TS_HOSTNAME: ${TS_HOSTNAME:-inventory-strato}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: "--ssh=false --advertise-tags=tag:inventory --accept-routes"
    volumes:
      - tailscale-state:/var/lib/tailscale
    healthcheck:
      test:
        - CMD-SHELL
        - "tailscale status --json 2>/dev/null | grep -q '\"BackendState\":\"Running\"'"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - app-net

volumes:
  tailscale-state:
