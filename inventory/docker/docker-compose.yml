# Base stack. Provider-unabhängig.
# Start: nicht direkt — immer mit einem VPN-Overlay kombinieren via justfile.
#
# Konvention: der VPN-Sidecar heißt IMMER 'vpn'. Die inventory-App joint
# seinen Netzwerk-Namespace und ist deshalb komplett VPN-agnostisch.
#
# Caddy reicht inventory nach außen. Da inventory keinen eigenen Netzwerk-
# Stack hat, erreicht Caddy es über den vpn-Service-Namen.

services:
  inventory:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: inventory:dev
    container_name: inventory
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    volumes:
      - ./data:/var/lib/inventory:rw
      - ./secrets/age.key:/etc/inventory/age.key:ro
    environment:
      INVENTORY_DB: /var/lib/inventory/inventory.db
      INVENTORY_LISTEN: "0.0.0.0:8080"
      AUTH_HEADER: X-Authentik-Username
      AGE_KEY_FILE: /etc/inventory/age.key
      RUST_LOG: info

    # --- Container-Hardening (Architekt-R5, analog docker-compose.vps.yml) ---
    # /run/inventory: tmpfs fuer entschluesseltes Klartext-Secret-Material,
    # das beim Boot aus den .enc-Files erzeugt wird (siehe docs/architecture.md).
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /run/inventory:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 64m
    pids_limit: 128
    cpus: 0.5

  # Forward-Auth-Sidecar. Behelfsloesung, solange kein externes SSO
  # (Authentik) bereitsteht. Caddy ruft es per forward_auth; bei Erfolg
  # liefert es den X-Authentik-Username-Header. Eigenes Binary aus
  # demselben Image — nur Entrypoint ueberschrieben.
  authgate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: inventory:dev
    container_name: authgate
    restart: unless-stopped
    entrypoint: ["/sbin/tini", "--", "/usr/local/bin/authgate"]
    command: ["serve"]
    networks:
      - app-net
    # Secrets (AUTHGATE_SESSION_SECRET, AUTHGATE_USERS) aus authgate.env.
    # Fehlt die Datei, startet authgate fail-closed (0 Benutzer).
    env_file:
      - path: ./secrets/authgate.env
        required: false
    environment:
      AUTHGATE_LISTEN: "0.0.0.0:9000"
      AUTHGATE_HEADER: X-Authentik-Username
      AUTHGATE_SESSION_TTL: "28800"
      # true setzt das Secure-Flag am Cookie — nur mit HTTPS (Caddy-TLS).
      # Fuer einen reinen HTTP-Smoke-Test in authgate.env auf false setzen.
      AUTHGATE_COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9000/auth/health"]
      interval: 30s
      timeout: 3s
      retries: 3

    # --- Container-Hardening (Architekt-R5) ---
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    mem_reservation: 32m
    pids_limit: 64
    cpus: 0.25

  caddy:
    # Digest-Pin (Architekt-R4) — Tag caddy:2-alpine, aufgeloest 2026-05-17.
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-net
    # SITE_ADDRESS: ":80" = nur HTTP (Tailnet/Smoke); eine Domain = auto-HTTPS.
    environment:
      SITE_ADDRESS: ":80"
    depends_on:
      - inventory
      - authgate

    # --- Container-Hardening (Architekt-R5) ---
    # NET_BIND_SERVICE bleibt: Caddy bindet 80/443 nach cap_drop:ALL.
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    pids_limit: 128

networks:
  app-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
