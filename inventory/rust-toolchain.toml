# Toolchain pin for the inventory workspace.
#
# Matches inventory/Cargo.toml `rust-version = "1.85"` (MSRV).
# Pinning the toolchain in-tree prevents CI from drifting onto a
# newer stable release whose default lint set could break the build
# (NIST SP 800-204C §3.4 — dependency pinning).
#
# MSRV bumped 1.75 -> 1.85: a transitive dependency requires the
# `edition2024` Cargo feature, which is stabilized starting with
# Cargo 1.85. 1.85 is the minimal MSRV that unlocks edition2024
# without pinning unnecessarily far ahead of current stable.
#
# To upgrade: bump both this file and `rust-version` in Cargo.toml
# in the same commit, then re-run `cargo build/test --locked`.

[toolchain]
channel = "1.85"
components = ["rustfmt", "clippy"]
profile = "minimal"
