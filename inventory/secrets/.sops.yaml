# sops-Konfiguration: welche age-Recipients dürfen welche Files entschlüsseln.
# Jeder Eintrag in age: ist ein PUBLIC key (age1...). Private Keys gehören
# auf die Hosts, nicht hier ins Repo.
#
# Hinzufügen eines neuen Recipients:
#   1. unten unter age: anhängen
#   2. sops updatekeys auf alle betroffenen .enc-Files anwenden
#   3. PR

creation_rules:
  - path_regex: \.env\.enc$
    age:
      # TODO: hier den Strato-Host-pubkey eintragen, z.B.:
      # - age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  - path_regex: wg0\.conf\.enc$
    age:
      # TODO: gleicher Strato-Host-pubkey
