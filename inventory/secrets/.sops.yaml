# sops-Konfiguration: welche age-Recipients dürfen welche Files entschlüsseln.
# Jeder Eintrag unter age: ist ein PUBLIC key (age1...). Private Keys gehören
# auf die Hosts bzw. den Hardware-Token, niemals hier ins Repo.
#
# === Multi-Recipient-Eskrow (Cockpit-ADR-0004 / Closing-Brief §2.2) =========
# Jede Datei der Edge-Klasse MUSS gegen GENAU DREI unabhängige Recipients
# verschlüsselt werden. Die Public Keys werden versioniert unter
#   edge-secrets/recipients/<träger>-<YYYY-MM-DD>.pub
# abgelegt. Die drei Recipients sind:
#
#   1. Edge-Host-Recipient        — Privatkey auf HAOS, /etc/inventory/age.key
#                                   (0400 root:root)
#   2. Backup-Operator-Recipient  — Privatkey auf dem vps-stack-Host,
#                                   /etc/backup/age.key
#   3. DR-Hardware-Token-Recipient — offline (YubiKey/PIV), physisch off-site
#                                   verwahrt (anderer Brandabschnitt / Schließfach)
#
# STATUS 2026-05-17: Die Recipients sind noch NICHT erzeugt. Der
# DR-Hardware-Token (Closing-Brief §7, Schritt 0) ist eine ausstehende
# User-Beschaffung. Bis alle drei Pubkeys vorliegen, bleiben die age:-Listen
# unten leer — eine Verschlüsselung ist erst danach möglich.
# Eine Reduktion auf 2 Recipients ist NICHT zulässig ohne Re-Open von
# Cockpit-ADR-0004 (§Alternatives Considered G).
#
# Recipient hinzufügen:
#   1. Pubkey-Datei nach edge-secrets/recipients/ committen
#   2. age1...-Wert unten beim passenden age: anhängen (alle 3 Regeln-Gruppen)
#   3. `sops updatekeys` auf alle betroffenen .enc-Files anwenden
#   4. PR

creation_rules:
  # --- Inventory-Betriebssecrets (VPN-Authkeys, authgate-Session) ----------
  - path_regex: \.env\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: wg0\.conf\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.

  # --- Edge-Klasse: Zigbee-/HA-/Node-RED-/MQTT-Backups (Closing-Brief §2.1) -
  # Diese Pfade dürfen im Repo ausschließlich verschlüsselt (.enc) liegen;
  # die Klartext-Varianten sind in .gitignore gesperrt.
  - path_regex: coordinator_backup\.json\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: zigbee2mqtt/.*\.yaml\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: .*secrets\.yaml\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: flows_cred\.json\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: mosquitto/(passwd|acl)\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
  - path_regex: .*tokens\.json\.enc$
    age:
      # TODO(recipients): 3 Pubkeys eintragen — siehe Kopf-Kommentar.
