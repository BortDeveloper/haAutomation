name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Wöchentlicher Sweep Mo 04:00 UTC, um neu publizierte
    # RustSec-Advisories und Dependabot-CVEs zeitnah aufzudecken.
    - cron: '0 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: home-inventory
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-19 (stable profile)
        with:
          toolchain: stable
      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: home-inventory
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: cargo-deny (licenses, advisories, sources)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: home-inventory
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-19 (stable profile)
        with:
          toolchain: stable
      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: home-inventory
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny check
        run: cargo deny --workspace check

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-notices:
    name: THIRD-PARTY-NOTICES drift check
    # Regenerates THIRD-PARTY-NOTICES.md from Cargo.lock and fails the
    # build if the committed copy is stale. Pair with cargo-deny
    # (license whitelist enforcement above) to give a complete
    # third-party-software trail:
    #   - cargo-deny: SPDX allowlist enforcement (deny.toml)
    #   - this job:   structural inventory (name+version+source),
    #                 always in sync with Cargo.lock by construction
    # Reference: OWASP Top-10 A06:2021 (Vulnerable and Outdated
    # Components), NIST SP 800-161r1 §SR-3 (Supply Chain Controls /
    # provenance tracking).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Regenerate notices from Cargo.lock
        # Pure shell + awk, no cargo toolchain or network required.
        # Deterministic: identical Cargo.lock → identical output.
        run: bash home-inventory/scripts/generate-notices.sh > /tmp/notices.generated.md
      - name: Diff against committed THIRD-PARTY-NOTICES.md
        run: |
          if ! diff -u THIRD-PARTY-NOTICES.md /tmp/notices.generated.md; then
            echo "::error file=THIRD-PARTY-NOTICES.md::THIRD-PARTY-NOTICES.md is out of sync with home-inventory/Cargo.lock."
            echo "::error::Run 'bash home-inventory/scripts/generate-notices.sh > THIRD-PARTY-NOTICES.md' locally and commit the result."
            exit 1
          fi
          echo "THIRD-PARTY-NOTICES.md is in sync with home-inventory/Cargo.lock."
