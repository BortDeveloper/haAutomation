# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# rust-clippy is a tool that runs a bunch of lints to catch common
# mistakes in your Rust code and help improve your Rust code.
# More details at https://github.com/rust-lang/rust-clippy
# and https://rust-lang.github.io/rust-clippy/

name: rust-clippy analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '37 1 * * 2'

# Minimaler Default-Permission-Satz (SLSA Build L3).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-clippy-analyze:
    name: Run rust-clippy analyzing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory
    permissions:
      contents: read
      security-events: write   # SARIF-Upload nach Code-Scanning
      actions: read            # nur für private Repos benötigt, wir lassen es explizit minimal
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (stable; pinned to 1.75 via rust-toolchain.toml)
        # Migration weg von deprecated actions-rs/toolchain
        # (Repo seit 2023 archiviert). dtolnay/rust-toolchain ist
        # die kanonische Folge, gleicher SHA wie in ci.yml.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master @ 2026-05-19
        with:
          toolchain: stable
          components: clippy

      - name: Install required cargo helpers
        run: cargo install clippy-sarif sarif-fmt --locked

      - name: Run rust-clippy (blocking, -D warnings)
        # continue-on-error entfernt: clippy ist jetzt Pflicht, nicht
        # Hinweis. SARIF wird trotzdem erzeugt, weil --message-format
        # auf jeden Fall geschrieben wird; failure am Step propagiert
        # nach oben und blockiert den Build.
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            --message-format=json \
            -- -D warnings \
            | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt

      - name: Upload analysis results to GitHub
        # SHA-Pin: github/codeql-action v3.35.5 = 458d36d7...
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        # Auch wenn der vorherige Step failt, wollen wir den SARIF
        # noch in Code-Scanning sehen.
        if: always()
        with:
          sarif_file: inventory/rust-clippy-results.sarif
          wait-for-processing: true
