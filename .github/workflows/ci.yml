name: CI Smoke Build

on:
  pull_request:
  push:
    branches: [main]

# Minimaler Default-Permission-Satz (SLSA Build L3 / GitHub
# Security Hardening Guide). Jobs eskalieren bei Bedarf lokal.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-build:
    name: Smoke Build + Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: home-inventory
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # GITHUB_TOKEN nicht im Working-Tree behalten —
          # Folge-Steps und transitive Actions sehen es sonst.
          persist-credentials: false
      - name: Install Rust toolchain (stable; pinned to 1.75 via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master @ 2026-05-19 (stable profile)
        with:
          toolchain: stable
      - name: Install sops + age
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          SOPS_VERSION="3.13.1"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          age --version
          sops --version
      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: home-inventory
      - name: cargo build
        run: cargo build --workspace --locked
      - name: cargo test
        run: cargo test --workspace --locked
